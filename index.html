<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      padding: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .legend {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .box {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 3px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1f2937;
      color: white;
      flex: 1;
      min-width: 180px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #1f2937;
      color: white;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 16px;
      background: white;
    }

    .footer {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 18px;
      }

      iframe {
        height: 75vh;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📅 Расписание смен</h1>

    <div class="legend">
      <span><div class="box"></div> — рабочий день ("1")</span>
    </div>

    <div class="controls">
      <input type="text" placeholder="Поиск (например: Наталья)" />
      <button onclick="location.reload()">🔄 Обновить</button>
    </div>

    
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSXlDk4vDSkTV5EbXX7akAcoD08jxW92wBZQJWZ_4Vwall7juVIGHhHtA9HVNYnr8q-NpBh3gdE-YeH/pubhtml"></iframe>

    <div class="footer">
      Обновляется автоматически каждые ~5 минут
    </div>
  </div>

</body>
</html>
